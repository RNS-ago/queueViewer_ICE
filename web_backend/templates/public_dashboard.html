<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="30">
  <title>Queue counter — public</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; color: #e0e0e0;
                 font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 32px 16px; text-align: center; }
    .big { font-size: 5rem; font-weight: 700; color: #4FC3F7; line-height: 1; }
    .label { text-transform: uppercase; letter-spacing: .1em; color: #888; font-size: .8rem; }
    .meta { margin-top: 24px; color: #777; font-size: .85rem; }
    a { color: #4FC3F7; }
    .picker { margin-bottom: 28px; }
    select { background: #1c1c1c; color: #e0e0e0; border: 1px solid #333;
             border-radius: 6px; padding: 8px 12px; font-size: 1rem; }
  </style>
</head>
<body>
  <!--
    MINIMAL PUBLIC DASHBOARD — placeholder.
    Replace this file with the minimal page you want to provide.
    The view passes these template variables you can use:
      {{ title }}         current zone name or device id
      {{ latest }}        latest record dict (.occupancy, .in, .out, .ts)
      {{ series_json }}   JSON array of recent records (safe to embed in JS)
  -->
  <div class="wrap">
    {% if zones or devices %}
    <div class="picker">
      <form method="get">
        <select name="target" onchange="this.form.submit()" aria-label="Choose a zone or sensor">
          {% if zones %}
          <optgroup label="Zones">
            {% for z in zones %}
              <option value="zone:{{ z.slug }}" {% if target == "zone:"|add:z.slug %}selected{% endif %}>{{ z.name }}</option>
            {% endfor %}
          </optgroup>
          {% endif %}
          {% if devices %}
          <optgroup label="Sensors">
            {% for d in devices %}
              <option value="device:{{ d }}" {% if target == "device:"|add:d %}selected{% endif %}>{{ d }}</option>
            {% endfor %}
          </optgroup>
          {% endif %}
        </select>
        <noscript><button type="submit">Show</button></noscript>
      </form>
    </div>
    {% endif %}
    <div class="label">People inside{% if title %} · {{ title }}{% endif %}</div>
    {% if latest %}
      <div class="big">{{ latest.occupancy }}</div>
      <div class="meta">in {{ latest.in }} · out {{ latest.out }}<br>as of {{ latest.ts }}</div>
    {% else %}
      <div class="big">—</div>
      <div class="meta">No data yet.</div>
    {% endif %}
    <div class="meta"><a href="{% url 'advanced_dashboard' %}">Staff dashboard →</a></div>
  </div>
</body>
</html>
