<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — queue counter</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #e0e0e0;
                 font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
                 display: flex; align-items: center; justify-content: center; }
    form { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px;
           padding: 28px; width: 300px; }
    h1 { font-size: 1.1rem; margin: 0 0 16px; }
    label { display: block; font-size: .8rem; color: #888; margin: 12px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 9px 10px; border-radius: 6px;
            border: 1px solid #333; background: #111; color: #e0e0e0; }
    button { margin-top: 18px; width: 100%; padding: 10px; border: 0; border-radius: 6px;
             background: #4FC3F7; color: #062a38; font-weight: 700; cursor: pointer; }
    .err { color: #FF7043; font-size: .85rem; margin-top: 10px; }
    a { color: #4FC3F7; font-size: .85rem; }
  </style>
</head>
<body>
  <form method="post">
    {% csrf_token %}
    <h1>Staff login</h1>
    {% if form.errors %}<div class="err">Invalid username or password.</div>{% endif %}
    <label for="id_username">Username</label>
    {{ form.username }}
    <label for="id_password">Password</label>
    {{ form.password }}
    <button type="submit">Log in</button>
    <input type="hidden" name="next" value="{{ next }}">
    <p style="margin-top:16px"><a href="{% url 'public_dashboard' %}">← Public dashboard</a></p>
  </form>
</body>
</html>
