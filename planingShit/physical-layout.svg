<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440" role="img" aria-label="Top-down view of a 2D LiDAR mounted on a central divider pillar, scanning the out lane on the left and the in lane on the right.">
  <defs>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}</style>
    <marker id="ahCoral" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L8 4L0 8z" fill="#D85A30"/></marker>
    <marker id="ahTeal" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L8 4L0 8z" fill="#1D9E75"/></marker>
  </defs>

  <rect x="0" y="0" width="680" height="440" fill="#FFFFFF"/>

  <text x="340" y="34" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Physical layout — central pillar mount (top-down)</text>
  <text x="340" y="70" text-anchor="middle" font-size="12" fill="#5F5E5A">Inside the building</text>
  <text x="340" y="412" text-anchor="middle" font-size="12" fill="#5F5E5A">Outside / street</text>

  <polygon points="332,222 96,96 96,352" fill="#EF9F27" opacity="0.10"/>
  <polygon points="348,222 584,96 584,352" fill="#EF9F27" opacity="0.10"/>

  <rect x="72" y="88" width="18" height="276" rx="2" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="590" y="88" width="18" height="276" rx="2" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>

  <line x1="96" y1="225" x2="326" y2="225" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="354" y1="225" x2="584" y2="225" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="200" y1="150" x2="200" y2="300" stroke="#D85A30" stroke-width="2" marker-end="url(#ahCoral)"/>
  <line x1="480" y1="300" x2="480" y2="150" stroke="#1D9E75" stroke-width="2" marker-end="url(#ahTeal)"/>

  <rect x="326" y="205" width="28" height="40" rx="2" fill="#B4B2A9" stroke="#888780" stroke-width="0.5"/>
  <circle cx="340" cy="225" r="6" fill="#444441"/>

  <text x="340" y="192" text-anchor="middle" font-size="12" fill="#2C2C2A" font-weight="500">LiDAR on pillar</text>
  <text x="200" y="124" text-anchor="middle" font-size="12" fill="#5F5E5A">Out lane (left)</text>
  <text x="480" y="124" text-anchor="middle" font-size="12" fill="#5F5E5A">In lane (right)</text>
  <text x="96" y="216" text-anchor="start" font-size="12" fill="#0F6E56">Counting line</text>
</svg>
